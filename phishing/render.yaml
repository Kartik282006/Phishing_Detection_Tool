databases:
  - name: phish-carnage-db
    plan: free
    databaseName: phish_carnage
    user: phish_carnage_user

services:
  - type: web
    name: phish-carnage
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: GOOGLE_API_KEY
        sync: false          # You will paste this manually in the Render dashboard
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a secure random value
      - key: DATABASE_URL
        fromDatabase:
          name: phish-carnage-db
          property: connectionString
